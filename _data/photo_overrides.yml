# Hand-curated captions and story/tale associations for photographs.
#
# Key each entry by the photo's slug (see _data/photos.yml for slugs). Entries
# here are merged into the manifest each time scripts/ingest_photos.py runs,
# so your work here is never clobbered by re-ingestion.
#
# `story` and `tale` take the slug of a story/tale (filename without .md in
# _stories/ or _tales/). Associated photos appear on that page and, by
# default, also in the main gallery.

